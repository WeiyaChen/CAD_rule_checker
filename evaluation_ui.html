<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>算法评估看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7fb; color: #223; }
    .container { padding: 24px; display: grid; gap: 18px; }
    .card { background: white; border-radius: 14px; padding: 18px; box-shadow: 0 6px 16px rgba(0,0,0,0.06); }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
    .controls label { display: flex; flex-direction: column; font-size: 0.85rem; color: #446; gap: 4px; }
    .controls input, .controls select { padding: 8px 10px; border-radius: 8px; border: 1px solid #cbd5e1; min-width: 180px; }
    .controls button { padding: 8px 20px; border-radius: 8px; border: none; background: #0f4c81; color: white; cursor: pointer; height: 36px; }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; }
    .top-bar a { text-decoration:none; font-size:0.85rem; color:#0f4c81; border:1px solid #0f4c81; padding:4px 12px; border-radius:6px; }
    .top-bar .lang-btn { background:none; border:1px solid #cbd5e1; padding:4px 12px; border-radius:6px; cursor:pointer; font-size:0.85rem; color:#446; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .metric { background: #f8fafc; border-radius: 10px; padding: 12px; }
    .metric strong { display: block; font-size: 1.1rem; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    .status-bar { background: #eef2f7; border-radius: 8px; padding: 10px 14px; font-size: 0.9rem; color: #446; white-space: pre-wrap; min-height: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top-bar">
        <div>
          <h2 style="margin:0 0 4px 0;" data-i18n="title">算法评估看板</h2>
          <p style="margin:0;" data-i18n="desc">批量运行评估流程，查看整体指标与样本级统计。</p>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <button class="lang-btn" id="langToggle" onclick="toggleLang()">EN</button>
          <a href="/" data-i18n="homeLink">⌂ 主页</a>
        </div>
      </div>
    </div>
    <div class="card">
      <h3 data-i18n="evalTitle">运行批量评估</h3>
      <div class="controls">
        <label data-i18n="sysLabel">
          系统输出目录
          <input id="sysOutDir" value="output/exp_jsonld" placeholder="e.g. output/exp_jsonld" />
        </label>
        <label data-i18n="gtLabel">
          真值目录
          <input id="gtDir" value="output/gt_jsonld" placeholder="e.g. output/gt_jsonld" />
        </label>
        <label data-i18n="vioLabel">
          违规报告目录（可选）
          <input id="violationDir" value="output/exp_res" placeholder="e.g. output/exp_res" />
        </label>
        <label data-i18n="evalOutLabel">
          评估结果输出目录
          <input id="evalOutputDir" value="output/html" placeholder="e.g. output/html" />
        </label>
        <label>
          <span>&nbsp;</span>
          <button id="runEvalBtn" onclick="runBatchEvaluation()" data-i18n="evalBtn">运行批量评估</button>
        </label>
      </div>
      <div id="evalStatus" class="status-bar" data-i18n="evalReady">就绪，点击「运行批量评估」开始。</div>
    </div>
    <div class="card">
      <h3 data-i18n="metricsTitle">整体指标</h3>
      <div id="overallMetrics" class="metrics"></div>
    </div>
    <div class="card">
      <h3 data-i18n="chartTitle">指标分布图</h3>
      <canvas id="metricChart" height="180"></canvas>
    </div>
    <div class="card">
      <h3 data-i18n="sampleTitle">样本级结果</h3>
      <table id="detailTable"></table>
    </div>
  </div>
  <script>
    async function runBatchEvaluation() {
      const btn = document.getElementById('runEvalBtn');
      const status = document.getElementById('evalStatus');
      btn.disabled = true;
      status.textContent = t('evalRunning');

      const payload = {
        sysOutDir: document.getElementById('sysOutDir').value,
        gtDir: document.getElementById('gtDir').value,
        violationDir: document.getElementById('violationDir').value,
        evalOutputDir: document.getElementById('evalOutputDir').value
      };

      try {
        const res = await fetch('/api/run-evaluation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.ok) {
          status.textContent = t('evalDone') + (data.message ? ' ' + data.message : '');
        } else {
          status.textContent = t('evalFail') + (data.error || t('unknownErr'));
        }
      } catch (err) {
        status.textContent = t('reqFail') + err.message;
      } finally {
        btn.disabled = false;
        loadEvaluationData();
      }
    }

    async function loadEvaluationData() {
      const response = await fetch('/api/evaluation-data');
      const data = await response.json();
      const metricsContainer = document.getElementById('overallMetrics');
      const metricEntries = Object.entries(data.overall).filter(([k]) => k !== 'source');
      metricsContainer.innerHTML = metricEntries.map(([name, value]) => `
        <div class="metric">
          <div>${name}</div>
          <strong>${Number(value).toFixed(4)}</strong>
        </div>
      `).join('');

      // Destroy existing chart if any
      const chartCanvas = document.getElementById('metricChart');
      if (window._evalChart) { window._evalChart.destroy(); }
      const chartData = data.chart || [];
      if (chartData.length) {
        window._evalChart = new Chart(chartCanvas, {
          type: 'bar',
          data: {
            labels: chartData.map(item => item.label),
            datasets: [{
              label: '指标数值',
              data: chartData.map(item => item.value),
              backgroundColor: ['#0f4c81', '#2a8fbd', '#16a085', '#f59e0b', '#e11d48']
            }]
          },
          options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
          }
        });
      }

      const table = document.getElementById('detailTable');
      const rows = data.individual || [];
      table.innerHTML = rows.length ? `
        <thead><tr>${Object.keys(rows[0]).map(k => '<th>' + k + '</th>').join('')}</tr></thead>
        <tbody>${rows.map(r => '<tr>' + Object.values(r).map(v => '<td>' + v + '</td>').join('') + '</tr>').join('')}</tbody>
      ` : '<tr><td>' + t('noSampleData') + '</td></tr>';
    }

    // i18n
    const i18n = {
      zh: {
        title: '算法评估看板', desc: '批量运行评估流程，查看整体指标与样本级统计。',
        homeLink: '⌂ 主页', evalTitle: '运行批量评估',
        sysLabel: '系统输出目录', gtLabel: '真值目录', vioLabel: '违规报告目录（可选）', evalOutLabel: '评估结果输出目录',
        evalBtn: '运行批量评估', evalReady: '就绪，点击「运行批量评估」开始。',
        evalRunning: '正在运行批量评估，请稍候…', evalDone: '批量评估完成。', evalFail: '评估失败：', unknownErr: '未知错误', reqFail: '请求失败：',
        metricsTitle: '整体指标', chartTitle: '指标分布图', sampleTitle: '样本级结果',
        noSampleData: '暂无样本级数据',
      },
      en: {
        title: 'Evaluation Dashboard', desc: 'Run batch evaluation, view overall metrics and per-sample statistics.',
        homeLink: '⌂ Home', evalTitle: 'Run Batch Evaluation',
        sysLabel: 'System Output Dir', gtLabel: 'Ground Truth Dir', vioLabel: 'Violation Report Dir (optional)', evalOutLabel: 'Evaluation Output Dir',
        evalBtn: 'Run Batch Evaluation', evalReady: 'Ready. Click "Run Batch Evaluation" to start.',
        evalRunning: 'Running batch evaluation, please wait…', evalDone: 'Batch evaluation complete.', evalFail: 'Evaluation failed: ', unknownErr: 'unknown error', reqFail: 'Request failed: ',
        metricsTitle: 'Overall Metrics', chartTitle: 'Metrics Chart', sampleTitle: 'Per-Sample Results',
        noSampleData: 'No sample data available',
      }
    };
    let currentLang = localStorage.getItem('eval_ui_lang') || 'zh';
    function t(key) { const dict = i18n[currentLang] || i18n.zh; return dict[key] || key; }
    function applyLang() {
      document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (el.tagName === 'INPUT') el.placeholder = t(k);
        else el.textContent = t(k);
      });
      document.getElementById('langToggle').textContent = currentLang === 'zh' ? 'EN' : '中';
    }
    function toggleLang() { currentLang = currentLang === 'zh' ? 'en' : 'zh'; localStorage.setItem('eval_ui_lang', currentLang); applyLang(); loadEvaluationData(); }
    applyLang();
  </script>
</body>
</html>
