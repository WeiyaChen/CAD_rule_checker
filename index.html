<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title">CAD 规则审查可视化工作台</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7fb; color: #223; }
    .hero { padding: 32px; background: linear-gradient(135deg, #0f4c81, #2a8fbd); color: white; position: relative; }
    .hero h1 { margin: 0 0 8px; font-size: 2rem; }
    .hero p { margin: 0; opacity: 0.9; }
    .lang-toggle-top { position: absolute; top: 16px; right: 24px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .lang-toggle-top:hover { background: rgba(255,255,255,0.35); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 24px; }
    .card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    .card h3 { margin-top: 0; }
    a.button { display: inline-block; margin-top: 10px; padding: 10px 14px; background: #0f4c81; color: white; text-decoration: none; border-radius: 8px; }
    a.button.secondary { background: #16a085; }
  </style>
</head>
<body>
  <div class="hero">
    <button class="lang-toggle-top" id="langToggle" onclick="toggleLang()">EN</button>
    <h1 data-i18n="title">CAD 规则审查可视化工作台</h1>
    <p data-i18n="subtitle">为端到端处理流程与算法评估提供图形界面。</p>
  </div>
  <div class="grid">
    <div class="card">
      <h3 data-i18n="card1Title">界面 1：端到端处理工作台</h3>
      <p data-i18n="card1Desc">选择单张图纸，运行审查步骤并预览结果。</p>
      <a class="button" href="/pipeline_ui.html" data-i18n="card1Btn">进入处理工作台</a>
    </div>
    <div class="card">
      <h3 data-i18n="card2Title">界面 2：评估分析看板</h3>
      <p data-i18n="card2Desc">批量运行评估流程，查看整体指标与样本级统计。</p>
      <a class="button secondary" href="/evaluation_ui.html" data-i18n="card2Btn">进入评估看板</a>
    </div>
  </div>
  <script>
    const i18n = {
      zh: {
        title: 'CAD 规则审查可视化工作台',
        subtitle: '为端到端处理流程与算法评估提供图形界面。',
        card1Title: '界面 1：端到端处理工作台',
        card1Desc: '选择单张图纸，运行审查步骤并预览结果。',
        card1Btn: '进入处理工作台',
        card2Title: '界面 2：评估分析看板',
        card2Desc: '批量运行评估流程，查看整体指标与样本级统计。',
        card2Btn: '进入评估看板',
      },
      en: {
        title: 'CAD Rule Checker Dashboard',
        subtitle: 'Graphical interface for end-to-end processing and evaluation.',
        card1Title: 'Tool 1: Pipeline Workbench',
        card1Desc: 'Select a single drawing, run review steps and preview results.',
        card1Btn: 'Open Pipeline',
        card2Title: 'Tool 2: Evaluation Dashboard',
        card2Desc: 'Run batch evaluation, view overall metrics and per-sample statistics.',
        card2Btn: 'Open Evaluation',
      }
    };
    let currentLang = localStorage.getItem('index_lang') || 'zh';
    function t(key) { const dict = i18n[currentLang] || i18n.zh; return dict[key] || key; }
    function applyLang() {
      document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
      document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); const text = t(k); if (text) el.textContent = text; });
      document.getElementById('langToggle').textContent = currentLang === 'zh' ? 'EN' : '中';
    }
    function toggleLang() { currentLang = currentLang === 'zh' ? 'en' : 'zh'; localStorage.setItem('index_lang', currentLang); applyLang(); }
    applyLang();
  </script>
</body>
</html>
